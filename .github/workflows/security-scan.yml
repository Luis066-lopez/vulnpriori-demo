# .github/workflows/security-scan.yml
#
# Pipeline DevSecOps del prototipo de priorización de vulnerabilidades.
#
# Este workflow se dispara automáticamente en cada push y pull request,
# y también puede ejecutarse manualmente desde la pestaña Actions de GitHub
# (botón "Run workflow"), lo cual es útil para demostraciones en vivo.
#
# Flujo del pipeline:
#   1. Checkout del repositorio.
#   2. Instalación de Python y de las dependencias de la API.
#   3. Instalación de pip-audit (escáner SCA).
#   4. Levanta la API FastAPI en background dentro del mismo job.
#   5. Espera a que la API esté lista (healthcheck).
#   6. Ejecuta pip-audit sobre demo-app/requirements.txt y guarda la salida JSON.
#   7. Envía la salida de pip-audit al endpoint /scan-report de la API.
#   8. Imprime la priorización en formato legible en los logs.
#   9. Sube los reportes JSON como artifact descargable.

name: Security Scan - Priorización de vulnerabilidades

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # permite disparar manualmente desde la UI de GitHub

jobs:
  scan-and-prioritize:
    name: Escanear y priorizar dependencias vulnerables
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Instalar dependencias de la API
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: 4. Instalar pip-audit (escáner SCA)
        run: pip install pip-audit

      - name: 5. Levantar la API FastAPI en background
        working-directory: ./api
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: 6. Esperar a que la API esté lista
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ | grep -q "200"; then
              echo "API lista despues de ${i} segundos"
              curl -s http://127.0.0.1:8000/
              echo ""
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: la API no respondio en 30 segundos"
          cat /tmp/uvicorn.log
          exit 1

      - name: 7. Escanear dependencias con pip-audit
        run: |
          echo "Ejecutando pip-audit sobre demo-app/requirements.txt..."
          # pip-audit devuelve codigo != 0 cuando encuentra vulnerabilidades.
          # Usamos `|| true` para continuar con el resto del workflow.
          pip-audit -r demo-app/requirements.txt --format json > scan-output.json || true
          echo ""
          echo "=== Salida cruda de pip-audit ==="
          python -m json.tool scan-output.json
          echo ""

      - name: 8. Enviar resultado a la API y obtener priorizacion
        run: |
          echo "Llamando al endpoint /scan-report..."
          curl -s -X POST http://127.0.0.1:8000/scan-report \
            -H "Content-Type: application/json" \
            --data-binary @scan-output.json \
            -o prioritized.json
          echo ""
          echo "=== Priorizacion devuelta por la API ==="
          python -m json.tool prioritized.json
          echo ""

      - name: 9. Resumen legible de la priorizacion
        run: |
          echo "============================================"
          echo " RESUMEN: vulnerabilidades priorizadas"
          echo "============================================"
          python <<'PYEOF'
          import json
          with open("prioritized.json") as f:
              results = json.load(f)
          if not results:
              print("No se encontraron vulnerabilidades.")
          else:
              for r in results:
                  prio = r["priority"]
                  pkg = f"{r['package_name']} {r['package_version']}"
                  cve = r["cve_id"]
                  reasoning = r["reasoning"]
                  fixes = r.get("fix_versions") or []
                  print(f"[{prio:8s}] {pkg:30s} -> {cve}")
                  print(f"           {reasoning}")
                  if fixes:
                      print(f"           Fix disponible: {', '.join(fixes)}")
                  print()
          PYEOF
          echo "============================================"

      - name: 10. Subir reportes como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: priorizacion-vulnerabilidades
          path: |
            scan-output.json
            prioritized.json
          retention-days: 30
